name: Deploy Image (GCP)

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
  pull_request:
    branches: [main]
    paths:
      - "mcp-server/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: mcp-infra-gcp
  REGISTRY: us-central1-docker.pkg.dev/mcp-infra-gcp/mcp-server
  IMAGE_NAME: mcp-server

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f mcp-server/Dockerfile \
            --build-arg CLOUD_PROVIDER=gcp \
            -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            -t $REGISTRY/$IMAGE_NAME:latest \
            mcp-server/

      - name: Push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker push $REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Deploy to Cloud Run
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gcloud run services update mcp-server-dev \
            --image=$REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }}
