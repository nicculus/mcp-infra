name: Terraform GCP

on:
  push:
    branches: [main]
    paths:
      - "terraform/environments/gcp-dev/**"
      - "terraform/modules/mcp-server-gcp/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/environments/gcp-dev/**"
      - "terraform/modules/mcp-server-gcp/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.12.0"
  WORKING_DIR: terraform/environments/gcp-dev
  GCP_REGION: us-central1
  GCP_PROJECT_ID: mcp-infra-gcp
  GCP_STATE_BUCKET: mcp-infra-tfstate-mcp-infra-gcp

jobs:
  check-changes:
    name: Check changed paths
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/environments/gcp-dev/**'
              - 'terraform/modules/mcp-server-gcp/**'
              - '.github/workflows/terraform-gcp.yml'

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.terraform == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_STATE_BUCKET }}"

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Run Checkov
        run: |
          pip install checkov -q
          checkov \
            -d terraform/bootstrap-gcp \
            -d terraform/environments/gcp-dev \
            -d terraform/modules/mcp-server-gcp \
            --framework terraform --quiet --soft-fail

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="gcp_project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="alarm_email=${{ vars.TF_VAR_ALARM_EMAIL }}" \
            -no-color -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const output = `#### GCP Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`\n${{ steps.plan.outputs.stdout }}\`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
