name: Deploy Image

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
  pull_request:
    branches: [main]
    paths:
      - "mcp-server/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: mcp-server

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: docker build -f mcp-server/Dockerfile.lambda -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG mcp-server/

      - name: Push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to Lambda
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          aws lambda update-function-code \
            --function-name mcp-server-dev \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            --region ${{ env.AWS_REGION }}
